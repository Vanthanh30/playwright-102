name: HyperExecute Playwright 102

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hyperexecute:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download HyperExecute CLI
        run: |
          curl -L -o hyperexecute https://downloads.lambdatest.com/hyperexecute/linux/hyperexecute
          chmod +x hyperexecute

      - name: Run Playwright tests on HyperExecute
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: ./hyperexecute --config hyperexecute.yaml --download-artifacts --force-clean-artifacts

      - name: Upload downloaded HyperExecute artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hyperexecute-artifacts
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
